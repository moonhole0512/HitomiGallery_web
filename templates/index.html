<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitomi Gallery</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ version }}">
</head>
<body>

    <div id="search-container">
        <!-- 메인 검색 필드 -->
        <div class="search-fields-grid">
            <div class="input-group">
                <label>Title</label>
                <input type="text" id="title-search" placeholder="Enter title...">
            </div>
            <div class="input-group">
                <label>Artist / Group</label>
                <input type="text" id="person-search" placeholder="Artist or group...">
            </div>
            <div class="input-group">
                <label>Series</label>
                <input type="text" id="series-search" placeholder="Series name...">
            </div>
            <div class="input-group">
                <label>Characters</label>
                <input type="text" id="characters-search" placeholder="Character name...">
            </div>
        </div>

        <!-- 태그 입력 (넓게) -->
        <div class="search-row full-width">
            <div class="input-group">
                <label>Tags</label>
                <input type="text" id="tags-search" placeholder="Tags (comma-separated)...">
            </div>
        </div>

        <!-- 하단 컨트롤 바 -->
        <div class="control-bar">
            <div class="control-group">
                <select id="rate-select" title="Rating Filter">
                    <option value="All">All Rates</option>
                    <option value="5">5 Stars</option>
                    <option value="4">4 Stars</option>
                    <option value="3">3 Stars</option>
                    <option value="2">2 Stars</option>
                    <option value="1">1 Star</option>
                </select>
                <select id="sort-select" title="Sort Order">
                    <option value="DESC">ID Desc</option>
                    <option value="ASC">ID Asc</option>
                    <option value="NEWEST_DB">Newest DB</option>
                    <option value="OLDEST_DB">Oldest DB</option>
                    <option value="RANDOM">Random</option>
                </select>
                <select id="page-size-select" title="Items per page">
                    <option value="20">20 / pg</option>
                    <option value="50">50 / pg</option>
                    <option value="100">100 / pg</option>
                </select>
                <select id="thumb-size-select" title="Thumbnail Size">
                    <option value="small">Small</option>
                    <option value="medium">Medium</option>
                    <option value="large">Large</option>
                </select>
            </div>
            <div class="button-group">
                <button id="update-button" class="btn-secondary">Update DB</button>
                <button id="recommend-button" class="btn-secondary" style="color: #ffc107; border-color: #ffc107;">For You</button>
                <button id="search-button" class="btn-primary">Search</button>
            </div>
        </div>
    </div>

    <div id="gallery-container"></div>

    <div id="pagination-container">
        <button id="prev-page">Previous</button>
        <span id="page-info">Page 1 of 1</span>
        <button id="next-page">Next</button>
    </div>

    <script src="/static/js/app.js?v={{ version }}"></script>

    <!-- Cover Selection Modal -->
    <div id="cover-modal" class="modal-hidden">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2>Select New Cover</h2>
            <div id="modal-image-container"></div>
            <button id="modal-confirm-button">Set as Cover</button>
        </div>
    </div>

    <!-- Info Modal -->
    <div id="info-modal" class="modal-hidden">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2>Gallery Information</h2>
            <div id="info-modal-content"></div>
        </div>
    </div>
</body>
</html>
